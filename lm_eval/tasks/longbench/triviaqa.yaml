
tag:
  - longbench_few_shot_tasks
task: longbench_triviaqa
dataset_path: THUDM/LongBench
test_split: test
dataset_name: triviaqa
doc_to_text: "Answer the question based on the given passage. Only give me the answer and do not output any other words. The following are some examples.\n\n{{context}}\n\n{{input}}"
doc_to_target: "{{answers}}"
multi_target_gather: "max"
generation_kwargs:
  max_gen_toks: 32
  temperature: 1
  do_sample: False
  until: ["\n"]
metric_list:
  - metric: !function metrics.score
    aggregation: mean
    higher_is_better: True
    score_type: qa_f1_score
metadata:
  version: 2.0
