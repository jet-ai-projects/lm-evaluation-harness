
tag:
  - longbench_code_tasks
task: longbench_lcc
dataset_path: THUDM/LongBench
test_split: test
dataset_name: lcc
doc_to_text: "Please complete the code given below. \n{{context}}Next line of code:\n"
doc_to_target: "{{answers}}"
multi_target_gather: "max"
generation_kwargs:
  max_gen_toks: 64
  temperature: 1
  do_sample: False
  until: []
metric_list:
  - metric: !function metrics.score
    aggregation: mean
    higher_is_better: True
    score_type: code_sim_score
metadata:
  version: 2.0
