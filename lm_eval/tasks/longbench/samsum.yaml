
tag:
  - longbench_few_shot_tasks
task: longbench_samsum
dataset_path: jet-ai/longbench
test_split: test
dataset_name: samsum
doc_to_text: "Summarize the dialogue into a few short sentences. The following are some examples.\n\n{{context}}\n\n{{input}}"
doc_to_target: "{{answers}}"
multi_target_gather: "max"
generation_kwargs:
  max_gen_toks: 128
  temperature: 1
  do_sample: False
  until: ["\n"]
metric_list:
  - metric: !function metrics.score
    aggregation: mean
    higher_is_better: True
    score_type: rouge_score
metadata:
  version: 2.0
